  <!-- Row 1 of checkers -->
  <rect x="64" y="368" width="16" height="16" fill="#FFFFFF"/>
  <rect x="96" y="368" width="16" height="16" fill="#FFFFFF"/>
  <rect x="128" y="368" width="16" height="16" fill="#FFFFFF"/>
  <rect x="160" y="368" width="16" height="16" fill="#FFFFFF"/>
