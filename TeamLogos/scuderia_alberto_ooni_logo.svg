  <rect x="192" y="228" width="128" height="8" fill="#F5C842"/>
  <rect x="192" y="236" width="128" height="8" fill="#E85C1A"/>
  <rect x="200" y="244" width="112" height="8" fill="#F5C842"/>
  <rect x="200" y="252" width="112" height="8" fill="#E85C1A"/>
  <rect x="208" y="260" width="96" height="8" fill="#F5C842"/>
  <rect x="208" y="268" width="96" height="8" fill="#E85C1A"/>
  <rect x="216" y="276" width="80" height="8" fill="#F5C842"/>
  <rect x="216" y="284" width="80" height="8" fill="#E85C1A"/>
  <rect x="224" y="292" width="64" height="8" fill="#F5C842"/>
  <rect x="224" y="300" width="64" height="8" fill="#E85C1A"/>
  <rect x="232" y="308" width="48" height="8" fill="#F5C842"/>
