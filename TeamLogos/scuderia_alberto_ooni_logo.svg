  <rect x="200" y="160" width="16" height="16" fill="#9B1A1A"/>
  <rect x="296" y="164" width="16" height="16" fill="#9B1A1A"/>
  <rect x="232" y="196" width="16" height="16" fill="#9B1A1A"/>
  <rect x="280" y="208" width="16" height="16" fill="#9B1A1A"/>
