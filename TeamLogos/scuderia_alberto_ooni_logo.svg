  <rect x="96" y="384" width="16" height="16" fill="#111111"/>
  <rect x="128" y="384" width="16" height="16" fill="#111111"/>
  <rect x="160" y="384" width="16" height="16" fill="#111111"/>
  <rect x="192" y="384" width="16" height="16" fill="#111111"/>
  <rect x="224" y="384" width="16" height="16" fill="#111111"/>
  <rect x="256" y="384" width="16" height="16" fill="#111111"/>
  <rect x="288" y="384" width="16" height="16" fill="#111111"/>
  <rect x="320" y="384" width="16" height="16" fill="#111111"/>
  <rect x="352" y="384" width="16" height="16" fill="#111111"/>
  <rect x="384" y="384" width="16" height="16" fill="#111111"/>
  <rect x="416" y="384" width="16" height="16" fill="#111111"/>

  <!-- Team name pixel text: SCUDERIA ALBERTO -->
  <!-- Using a blocky pixel font style via rectangles -->
  <!-- "SCUDERIA" top line -->
  <text x="256" y="66" font-family="'Courier New', monospace" font-size="20" font-weight="900" fill="#FF2200" text-anchor="middle" letter-spacing="4" style="image-rendering:pixelated; font-variant: all-caps;">SCUDERIA</text>

  <!-- "ALBERTO" second line -->
  <text x="256" y="90" font-family="'Courier New', monospace" font-size="20" font-weight="900" fill="#EEEEEE" text-anchor="middle" letter-spacing="4">ALBERTO</text>

  <!-- "PRO-PIZZA" below checkers -->
  <text x="256" y="430" font-family="'Courier New', monospace" font-size="22" font-weight="900" fill="#F5C842" text-anchor="middle" letter-spacing="3">PRO-PIZZA</text>

  <!-- "RACING" bottom -->
  <text x="256" y="458" font-family="'Courier New', monospace" font-size="18" font-weight="900" fill="#FF2200" text-anchor="middle" letter-spacing="6">RACING</text>

  <!-- pixel dots decorative bottom corners -->
  <rect x="40" y="420" width="8" height="8" fill="#FF2200"/>
  <rect x="48" y="420" width="8" height="8" fill="#FF2200"/>
  <rect x="40" y="428" width="8" height="8" fill="#FF2200"/>

  <rect x="456" y="420" width="8" height="8" fill="#FF2200"/>
  <rect x="464" y="420" width="8" height="8" fill="#FF2200"/>
  <rect x="464" y="428" width="8" height="8" fill="#FF2200"/>

  <!-- scan line overlay effect (subtle) -->
  <!-- thin horizontal lines every 4px for CRT feel -->
  <rect x="28" y="28" width="456" height="1" fill="#000000" opacity="0.15"/>
  <rect x="28" y="32" width="456" height="1" fill="#000000" opacity="0.15"/>
  <rect x="28" y="36" width="456" height="1" fill="#000000" opacity="0.15"/>

</svg>
