  <rect x="80" y="384" width="16" height="16" fill="#FFFFFF"/>
  <rect x="112" y="384" width="16" height="16" fill="#FFFFFF"/>
  <rect x="144" y="384" width="16" height="16" fill="#FFFFFF"/>
  <rect x="176" y="384" width="16" height="16" fill="#FFFFFF"/>
  <rect x="208" y="384" width="16" height="16" fill="#FFFFFF"/>
  <rect x="240" y="384" width="16" height="16" fill="#FFFFFF"/>
  <rect x="272" y="384" width="16" height="16" fill="#FFFFFF"/>
  <rect x="304" y="384" width="16" height="16" fill="#FFFFFF"/>
  <rect x="336" y="384" width="16" height="16" fill="#FFFFFF"/>
  <rect x="368" y="384" width="16" height="16" fill="#FFFFFF"/>
