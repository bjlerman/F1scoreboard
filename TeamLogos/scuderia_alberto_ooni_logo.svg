<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" shape-rendering="crispEdges">
  <defs>
    <style>
      .pixel { image-rendering: pixelated; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0a"/>

  <!-- Outer border - red -->
  <rect x="8" y="8" width="496" height="496" fill="none" stroke="#CC1100" stroke-width="8"/>
  <!-- Inner border - white -->
  <rect x="20" y="20" width="472" height="472" fill="none" stroke="#EEEEEE" stroke-width="4"/>

  <!-- Corner pixel accents - top left -->
  <rect x="8" y="8" width="16" height="16" fill="#FF2200"/>
  <rect x="24" y="8" width="8" height="8" fill="#FF2200"/>
  <rect x="8" y="24" width="8" height="8" fill="#FF2200"/>

  <!-- Corner pixel accents - top right -->
  <rect x="488" y="8" width="16" height="16" fill="#FF2200"/>
  <rect x="480" y="8" width="8" height="8" fill="#FF2200"/>
  <rect x="488" y="24" width="8" height="8" fill="#FF2200"/>

  <!-- Corner pixel accents - bottom left -->
