  <rect x="136" y="116" width="240" height="16" fill="#D4813A"/>
  <rect x="128" y="132" width="256" height="8" fill="#D4813A"/>

  <!-- Cheese layer -->
  <rect x="144" y="140" width="224" height="8" fill="#F5C842"/>
  <rect x="152" y="148" width="208" height="8" fill="#F5C842"/>

  <!-- Sauce + cheese main body building down to point -->
  <!-- Row 1 -->
  <rect x="152" y="156" width="208" height="8" fill="#E85C1A"/>
  <rect x="160" y="164" width="192" height="8" fill="#F5C842"/>
  <rect x="160" y="172" width="192" height="8" fill="#E85C1A"/>
  <rect x="168" y="180" width="176" height="8" fill="#F5C842"/>
